<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CCECHO VIEWER</title>
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="app-shell">
    <header class="masthead">
        <div class="brand-wrap">
            <p class="brand-kicker">Local Traffic Observatory</p>
            <div class="brand">CCECHO VIEWER</div>
        </div>
        <div class="toolbar-group control-grid">
            <button class="btn" id="toggle-theme">Theme: AUTO</button>
            <button class="btn" id="toggle-follow">Follow Latest: ON</button>
            <button class="btn" id="toggle-refresh">Auto Refresh: ON</button>
            <button class="btn primary" id="refresh-now">Refresh</button>
            <span class="meta status-meta" id="status-meta">Ready</span>
        </div>
    </header>

    <main class="workspace">
        <section class="rail">
            <article class="panel panel-sessions">
                <div class="title">Sessions</div>
                <div class="section">
                    <input class="input" id="session-filter" placeholder="Filter session...">
                    <div class="item-list" id="sessions"></div>
                </div>
            </article>

            <article class="panel panel-requests">
                <div class="title">Requests</div>
                <div class="section">
                    <div class="item-list" id="items"></div>
                </div>
            </article>
        </section>

        <section class="panel detail-panel">
            <div class="title" id="detail-title">Detail</div>
            <div class="detail" id="detail">Select one request.</div>
        </section>
    </main>
</div>
<script src="/assets/app.js"></script>
</body>
</html>
